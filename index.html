<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cubanitos Apps</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --ink: #201a17;
      --muted: #6b625d;
      --card: #ffffff;
      --line: #e4ddd5;
      --accent: #c92828;
      --accent-dark: #9f1f1f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(680px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(32, 26, 23, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.1;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.45;
    }

    .apps {
      display: grid;
      gap: 12px;
    }

    a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      min-height: 56px;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid var(--line);
      color: var(--ink);
      text-decoration: none;
      font-weight: 700;
      transition: border-color 160ms ease, transform 160ms ease;
    }

    a:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    span {
      color: var(--accent-dark);
      font-size: 20px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Cubanitos Apps</h1>
    <p>Elegí la app que querés abrir. Cada link usa el mismo Supabase, pero carga su propia nube.</p>
    <div class="apps">
      <a href="./APP_CUBANITOS_DEMO/">Cubanitos Demo <span aria-hidden="true">›</span></a>
      <a href="./APP_CUBANITOS_PALIHUE/">Cubanitos Palihue <span aria-hidden="true">›</span></a>
    </div>
  </main>
</body>
</html>
